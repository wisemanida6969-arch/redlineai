# Extends the default Node build with Python + pyhwp (hwp5txt), used to
# extract text from old-format binary .hwp files (구형 한글 문서).
# If this Python setup ever fails to build/install, the app still works —
# lib/hwpBinaryExtract.ts degrades to "" on any missing/broken binary, and
# callers fall back to the existing paste-text guidance.

providers = ["node"]

[phases.setup]
# Nix's python311 does NOT bundle pip (ensurepip fails on it silently) — the
# pip package must be pulled in explicitly or pyhwp never installs.
nixPkgs = ["nodejs", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  # pip cannot install into python311's own site-packages: that path lives
  # under the read-only /nix/store, so even --break-system-packages fails
  # ("externally-managed-environment... immutable /nix/store filesystem").
  # `python3 -m venv` isn't an option either — it bootstraps via ensurepip,
  # which this Nix python also lacks, so venv creation itself fails and
  # aborts the whole build. Instead, use the already-working nixpkgs pip
  # directly with --prefix to install into a plain writable directory under
  # /app (same bin/ layout a venv would produce). No ensurepip involved.
  # lib/hwpBinaryExtract.ts calls this prefix's hwp5txt by absolute path.
  "pip install --no-cache-dir --prefix=/app/.venv-hwp pyhwp || true"
]
