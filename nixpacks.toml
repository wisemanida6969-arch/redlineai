# Extends the default Node build with Python + pyhwp (hwp5txt), used to
# extract text from old-format binary .hwp files (구형 한글 문서).
# If this Python setup ever fails to build/install, the app still works —
# lib/hwpBinaryExtract.ts degrades to "" on any missing/broken binary, and
# callers fall back to the existing paste-text guidance.

providers = ["node"]

[phases.setup]
# Nix's python311 does NOT bundle pip (ensurepip fails on it silently) — the
# pip package must be pulled in explicitly or pyhwp never installs.
nixPkgs = ["nodejs", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "pip install --no-cache-dir pyhwp || pip install --no-cache-dir --break-system-packages pyhwp || true"
]
